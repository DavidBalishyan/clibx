name: Build and Deploy MkDocs Docs

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install MkDocs Material + tools
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc
          pip install mkdocs mkdocs-material

      # Prepare docs folder
      - name: Prepare docs folder
        run: mkdir -p docs/man

      # Add MkDocs hook
      - name: Add MkDocs hooks
        run: |
          cat > hooks.py << 'EOF'
          import re

          def on_page_markdown(markdown, **kwargs):
              # --- 1. Remove "Table of contents" section ---
              toc_pattern = re.compile(
                  r"(#+ Table of contents.*?)(\n# |\Z)",
                  re.DOTALL | re.IGNORECASE
              )
              markdown = re.sub(toc_pattern, r"\2", markdown)

              # --- 2. Remove ONLY the GitHub banner note (specific text match) ---
              banner_pattern = re.compile(
                  r"> \[!NOTE\]\n((?:> .*\n?)*)",
                  re.MULTILINE
              )

              def remove_banner(match):
                  content = match.group(1)
                  if "This README is also available" in content:
                      return ""  # remove it
                  return match.group(0)  # keep it

              markdown = re.sub(banner_pattern, remove_banner, markdown)

              # --- 3. Convert remaining GitHub callouts to MkDocs admonitions ---
              def repl(match):
                  kind = match.group(1).lower()
                  content = re.sub(r"^> ?", "", match.group(2), flags=re.MULTILINE)
                  indented = "\n".join("    " + line for line in content.strip().splitlines())
                  return f"!!! {kind}\n{indented}\n"

              callout_pattern = re.compile(
                  r"> \[!(NOTE|TIP|WARNING|IMPORTANT|CAUTION)\]\n((?:> .*\n?)*)",
                  re.MULTILINE,
              )

              markdown = re.sub(callout_pattern, repl, markdown)

              return markdown
          EOF

      # Create mkdocs.yml
      - name: Create mkdocs.yml
        run: |
          cat > mkdocs.yml << 'EOF'
          site_name: clibx

          hooks:
            - hooks.py

          theme:
            name: material
            palette:
              - scheme: default
                toggle:
                  icon: material/weather-night
                  name: Switch to dark mode
              - scheme: slate
                toggle:
                  icon: material/weather-sunny
                  name: Switch to light mode

          markdown_extensions:
            - admonition
            - toc:
                permalink: true

          nav:
            - Home: index.md
            - Installation: install.md
            - clibx(3): man/clibx.md
            - clibx_print(3): man/clibx_print.md
            - clibx_list(3): man/clibx_list.md
            - LICENSE: LICENSE.md
          EOF

      # Copy project docs
      - name: Copy README as index
        run: cp README.md docs/index.md

      - name: Copy INSTALL
        run: cp INSTALL.md docs/install.md

      - name: Copy LICENSE
        run: cp LICENSE docs/LICENSE.md

      # Convert manpages -> Markdown
      - name: Convert manpages
        run: |
          for f in man/man3/*; do
            name=$(basename "$f" .3)
            pandoc "$f" -f man -t markdown -o "docs/man/${name}.md"
          done

      # Build site
      - name: Build site
        run: mkdocs build

      # Upload Pages artifact
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
